[pytest]
# Make the `prlens` package importable when running from the project root.
pythonpath = .

# Only collect real pytest modules (test_*.py). The legacy tests/*-test.py
# scratch scripts are intentionally excluded from collection.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -ra --import-mode=importlib
